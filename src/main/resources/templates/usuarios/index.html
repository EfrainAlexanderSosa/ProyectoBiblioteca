<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/usuarios/index.css">
    <title>Lista de Usuarios</title>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="d-flex justify-content-between align-items-center">
            <h1><i class="fas fa-users me-2"></i>Lista de Usuarios</h1>
            <span class="badge fs-6">Total: <span th:text="${usuarios.size()}">0</span></span>
        </div>
    </div>

    <!-- BUSCADOR Y BOTÓN PDF -->
    <div style="display: flex; gap: 10px; margin-bottom: 20px; align-items: center;">
        <form th:action="@{/usuarios}" method="get" style="flex: 1; display: flex; gap: 10px;">
            <input type="text" 
                   name="busqueda" 
                   th:value="${busqueda}"
                   placeholder="Buscar por nombre o email..."
                   style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            <button type="submit" class="btn btn-primary" style="padding: 10px 20px;">
                🔍 Buscar
            </button>
            <a th:href="@{/usuarios}" class="btn btn-secondary" style="padding: 10px 20px;">
                ❌ Limpiar
            </a>
        </form>
        
        <a th:href="@{/usuarios/pdf(busqueda=${busqueda})}" 
           class="btn btn-danger" 
           style="padding: 10px 20px; white-space: nowrap;">
            📄 Generar PDF
        </a>
    </div>

    <a th:href="@{/usuarios/nuevo}" class="btn btn-add">
        <i class="fas fa-user-plus me-2"></i>Registrar nuevo usuario
    </a>

    <div class="table-container">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="usuario : ${usuarios}">
                    <td th:text="${usuario.idUsuario}">1</td>
                    <td th:text="${usuario.nombre}">Nombre</td>
                    <td th:text="${usuario.email}">email@ejemplo.com</td>
                    <td class="text-end">
                        <a th:href="@{/usuarios/editar/{id}(id=${usuario.idUsuario})}"
                           class="btn btn-sm btn-primary action-btn">
                            <i class="fas fa-edit"></i> Editar
                        </a>
                        <a th:href="@{/usuarios/eliminar/{id}(id=${usuario.idUsuario})}"
                           class="btn btn-sm btn-danger action-btn"
                           onclick="return confirm('¿Estás seguro que deseas eliminar este usuario?')">
                            <i class="fas fa-trash-alt"></i> Eliminar
                        </a>
                    </td>
                </tr>
                <tr th:if="${usuarios.empty}">
                    <td colspan="4" class="text-center text-muted">
                        <span th:if="${busqueda}">No se encontraron resultados para "<span th:text="${busqueda}"></span>"</span>
                        <span th:unless="${busqueda}">No hay usuarios registrados</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<div style="margin-top: 20px;">
    <a href="/gestion" class="btn btn-secondary">Volver a Gestión</a>
</div>
</body>
</html>
