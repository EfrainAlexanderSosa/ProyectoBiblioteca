<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header text-center">
          <h3>Iniciar Sesión</h3>
        </div>
        <div class="card-body">
          <form th:action="@{/login}" method="post">
            <div class="mb-3">
              <label class="form-label">Usuario</label>
              <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-primary">Ingresar</button>
            </div>
          </form>
        </div>
        <div class="card-footer text-center">
          <a th:href="@{/registro}">¿No tienes cuenta? Regístrate</a>
          <div class="text-danger mt-2" th:if="${param.error}">❌ Usuario o contraseña incorrectos</div>
          <div class="text-success mt-2" th:if="${param.registrado}">✅ Registro exitoso</div>
          <div class="text-info mt-2" th:if="${param.logout}">Has cerrado sesión</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
